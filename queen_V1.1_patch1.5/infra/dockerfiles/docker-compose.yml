###############################################################################
# Queen V1 — docker-compose.yml
# Lancement: docker compose up --build
# Dashboard: http://localhost:8080
###############################################################################

services:

  # ── Redis (message bus) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - queen_net

  # ── Orchestrator (cerveau) ──────────────────────────────────
  orchestrator:
    build:
      context: .
      dockerfile: infra/dockerfiles/Dockerfile.orchestrator
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - queen_data:/data
      - workspace:/workspace
      - ./tools:/app/tools:ro
      - ./roles:/app/roles:ro
      - ./skills:/app/skills:ro
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - NOTIFY_WEBHOOK_URL=${NOTIFY_WEBHOOK_URL:-}
      - NOTIFY_WEBHOOK_FORMAT=${NOTIFY_WEBHOOK_FORMAT:-generic}
      - NOTIFY_WEBHOOK_EVENTS=${NOTIFY_WEBHOOK_EVENTS:-}
      - NOTIFY_WEBHOOK_URL_2=${NOTIFY_WEBHOOK_URL_2:-}
      - NOTIFY_WEBHOOK_FORMAT_2=${NOTIFY_WEBHOOK_FORMAT_2:-generic}
      - NOTIFY_WEBHOOK_EVENTS_2=${NOTIFY_WEBHOOK_EVENTS_2:-}
      - POLICY_JOB_TIMEOUT=${POLICY_JOB_TIMEOUT:-300}
      - POLICY_MAX_JOB_TIMEOUT=${POLICY_MAX_JOB_TIMEOUT:-1800}
      - POLICY_MAX_OUTPUT_BYTES=${POLICY_MAX_OUTPUT_BYTES:-10000000}
      - POLICY_MAX_JOBS_PER_RUN=${POLICY_MAX_JOBS_PER_RUN:-20}
      - POLICY_MAX_CONCURRENT_JOBS=${POLICY_MAX_CONCURRENT_JOBS:-5}
    networks:
      - queen_net

  # ── Worker 1 (tous types) ───────────────────────────────────
  worker-1:
    build:
      context: .
      dockerfile: infra/dockerfiles/Dockerfile.worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - workspace:/workspace
      - ./tools:/app/tools:ro
      - ./roles:/app/roles:ro
      - ./skills:/app/skills:ro
    environment:
      - REDIS_URL=redis://redis:6379/0
      - WORKER_ID=worker-1
      - WORKER_TYPES=research,codegen,test,eval,patch
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - NOTIFY_WEBHOOK_URL=${NOTIFY_WEBHOOK_URL:-}
      - NOTIFY_WEBHOOK_FORMAT=${NOTIFY_WEBHOOK_FORMAT:-generic}
      - NOTIFY_WEBHOOK_EVENTS=${NOTIFY_WEBHOOK_EVENTS:-}
      - NOTIFY_WEBHOOK_URL_2=${NOTIFY_WEBHOOK_URL_2:-}
      - NOTIFY_WEBHOOK_FORMAT_2=${NOTIFY_WEBHOOK_FORMAT_2:-generic}
      - NOTIFY_WEBHOOK_EVENTS_2=${NOTIFY_WEBHOOK_EVENTS_2:-}
    networks:
      - queen_net

  # ── Worker 2 (optionnel, scale up) ─────────────────────────
  worker-2:
    build:
      context: .
      dockerfile: infra/dockerfiles/Dockerfile.worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - workspace:/workspace
      - ./tools:/app/tools:ro
      - ./roles:/app/roles:ro
      - ./skills:/app/skills:ro
    environment:
      - REDIS_URL=redis://redis:6379/0
      - WORKER_ID=worker-2
      - WORKER_TYPES=research,codegen,test,eval,patch
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - NOTIFY_WEBHOOK_URL=${NOTIFY_WEBHOOK_URL:-}
      - NOTIFY_WEBHOOK_FORMAT=${NOTIFY_WEBHOOK_FORMAT:-generic}
      - NOTIFY_WEBHOOK_EVENTS=${NOTIFY_WEBHOOK_EVENTS:-}
      - NOTIFY_WEBHOOK_URL_2=${NOTIFY_WEBHOOK_URL_2:-}
      - NOTIFY_WEBHOOK_FORMAT_2=${NOTIFY_WEBHOOK_FORMAT_2:-generic}
      - NOTIFY_WEBHOOK_EVENTS_2=${NOTIFY_WEBHOOK_EVENTS_2:-}
    networks:
      - queen_net
    profiles:
      - scale  # Activé uniquement avec: docker compose --profile scale up

  # ── Dashboard (API + UI) ────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: infra/dockerfiles/Dockerfile.dashboard
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - queen_data:/data
      - workspace:/workspace
      - ./tools:/app/tools:ro
      - ./roles:/app/roles:ro
      - ./skills:/app/skills:ro
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=8080
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - NOTIFY_WEBHOOK_URL=${NOTIFY_WEBHOOK_URL:-}
      - NOTIFY_WEBHOOK_FORMAT=${NOTIFY_WEBHOOK_FORMAT:-generic}
      - NOTIFY_WEBHOOK_EVENTS=${NOTIFY_WEBHOOK_EVENTS:-}
      - NOTIFY_WEBHOOK_URL_2=${NOTIFY_WEBHOOK_URL_2:-}
      - NOTIFY_WEBHOOK_FORMAT_2=${NOTIFY_WEBHOOK_FORMAT_2:-generic}
      - NOTIFY_WEBHOOK_EVENTS_2=${NOTIFY_WEBHOOK_EVENTS_2:-}
    networks:
      - queen_net

  # ── Ollama (LLM local) — optionnel ─────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # GPU passthrough (décommenter si NVIDIA)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - queen_net
    profiles:
      - ollama  # Activé avec: docker compose --profile ollama up

  # ── Evolver (DGM-like MVP) — optionnel ─────────────────────
  # Lance une boucle d'évolution qui génère des variantes candidates
  # et les archive dans /data/evolution.
  evolver:
    build:
      context: .
      dockerfile: infra/dockerfiles/Dockerfile.orchestrator
    restart: "no"
    depends_on:
      redis:
        condition: service_healthy
    command: ["python", "-m", "queen_core.evolution.evolver", "--iterations", "5"]
    volumes:
      - queen_data:/data
      - workspace:/workspace
      - ./tools:/app/tools:ro
      - ./roles:/app/roles:ro
      - ./skills:/app/skills:ro
    environment:
      - REDIS_URL=redis://redis:6379/0
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - EVOLUTION_ITERS=${EVOLUTION_ITERS:-5}
      - EVOLUTION_MAX_FILES=${EVOLUTION_MAX_FILES:-2}
      - EVOLUTION_EXPLORATION=${EVOLUTION_EXPLORATION:-0.15}
      - EVOLUTION_INSTRUCTION=${EVOLUTION_INSTRUCTION:-Improve reliability and bug-resilience without changing external behavior.}
      - EVOLUTION_ALLOWLIST=${EVOLUTION_ALLOWLIST:-}
      - EVOLUTION_TARGETS=${EVOLUTION_TARGETS:-}
    networks:
      - queen_net
    profiles:
      - evolver  # Activé avec: docker compose --profile evolver up

# ── Volumes persistants ───────────────────────────────────────
volumes:
  redis_data:
  queen_data:
  workspace:
  ollama_data:

# ── Réseau isolé ─────────────────────────────────────────────
networks:
  queen_net:
    driver: bridge
