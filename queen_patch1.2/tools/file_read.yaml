# tools/file_read.yaml — Lecture de fichier (pour phase research)
name: file_read
description: "Lit le contenu d'un fichier du workspace. Utilisé en phase research."
category: research
command_template: "cat {file_path}"
timeout_seconds: 15
max_output_bytes: 2000000
sandbox: true
risk_level: low
requires_approval: false
enabled: true
allowed_extensions:
  - .py
  - .json
  - .md
  - .txt
  - .yaml
  - .yml
  - .toml
  - .cfg
  - .ini
blocked_patterns: []
tags:
  - research
  - read
