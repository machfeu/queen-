# tools/python_exec.yaml — Exécution de code Python sandboxé
name: python_exec
description: "Exécute un script Python dans le workspace. Utilisé pour codegen et tests."
category: codegen
command_template: "python3 {file_path}"
timeout_seconds: 120
max_output_bytes: 5000000
sandbox: true
risk_level: medium
requires_approval: false
enabled: true
allowed_extensions:
  - .py
blocked_patterns:
  - "os.system"
  - "subprocess.Popen"
  - "eval("
  - "exec("
  - "__import__"
  - "shutil.rmtree"
tags:
  - codegen
  - test
env: {}
