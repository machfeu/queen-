# tools/file_write.yaml — Écriture de fichier dans le workspace
name: file_write
description: "Écrit un fichier dans le workspace. Utilisé par codegen et patch."
category: codegen
command_template: "write {file_path}"
timeout_seconds: 30
max_output_bytes: 5000000
sandbox: true
risk_level: medium
requires_approval: false
enabled: true
allowed_extensions:
  - .py
  - .json
  - .md
  - .txt
  - .yaml
  - .yml
blocked_patterns:
  - ".."
  - "/etc/"
  - "/root/"
  - "/home/"
tags:
  - codegen
  - patch
  - write
